name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      # Ruff linting (stylistic and code quality checks)
      - name: Ruff lint
        run: uvx ruff check --output-format=github .

      # Ruff format check (does NOT modify code, just checks formatting)
      - name: Ruff format
        run: uvx ruff format --check .

      # isort (import sorting check only, with Black profile)
      - name: isort
        run: uvx isort --check-only --profile black .

      # Bandit security checks
      - name: Bandit
        run: uvx bandit -c pyproject.toml -ll --skip=B101,B403,B601 -r .

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: |
          uv run pytest --tb=short -v \
            --junitxml=pytest-report.xml \
            --cov=. \
            --cov-report=term-missing \
            tests

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-report-${{ matrix.python-version }}
          path: pytest-report.xml

  autofix:
    name: Auto-fix Style Issues
    runs-on: ubuntu-latest
    if: github.event.pull_request
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: astral-sh/setup-uv@v5

      - name: isort (fix)
        run: uvx isort --profile black .

      - name: ruff fix
        run: |
          uvx ruff check . --fix
          uvx ruff format .

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-format and import-sort code [skip ci]"
            git push
          fi
